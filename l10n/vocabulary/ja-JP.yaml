# ja-JP errand-section vocabulary — FROZEN 2026-06-12 (user-reviewed; changes within a major are additive only).
#
# slug: the stable enum value models generate and modules ship.
# label: the signage text a Japanese supermarket actually hangs.
# merges: free-text sections from the discovery pass that fold into this slug.
#
# 2026-06-12 signage pass (subagent-verified against イオン/ライフ/ヨーカドー
# layouts): 日配品 removed — it is trade jargon shoppers never see on a sign;
# its contents redistributed to dairy_eggs / pickles_surimi / chilled_noodles.
# Vocabulary is PREFERRED, not enforced: the model may coin a slug when no
# section honestly fits (strays.ts surfaces those for review).
status: frozen
sections:
  - slug: produce
    label: 青果
    merges: [青果, 野菜, 野菜・果物, 山菜・野草]
  - slug: meat
    label: 精肉
    merges: [精肉, 精肉店, 精肉（ジビエ・特殊肉）, 精肉(輸入食材店), 精肉・ジビエ, 精肉・ハム]
  - slug: seafood
    label: 鮮魚
    note: 塩干・干物 (salted/dried fish) is sub-signage here, not its own section
    merges: [鮮魚]
  - slug: ham_sausage
    label: ハム・ソーセージ
    merges: [ハム・ソーセージ, 食肉加工品, 加工肉・ハム・ソーセージ]
  - slug: dairy_eggs
    label: 牛乳・乳製品・卵
    note: replaces 日配品 (trade jargon, not signage — fixed 2026-06-12); incl. yogurt/chilled desserts
    merges: [日配品, 乳製品, チーズ]
  - slug: soy_products
    label: 豆腐・納豆
    note: also konnyaku/shirataki (signage often 豆腐・納豆・こんにゃく)
    merges: [豆腐, 豆腐・納豆]
  - slug: pickles_surimi
    label: 漬物・練り物
    note: split out of the removed 日配品 — shared signage in most stores
    merges: [漬物, 練り物]
  - slug: chilled_noodles
    label: チルド麺
    note: signage-added 2026-06-12 — fresh udon/ramen/yakisoba, fresh pasta, gyoza wrappers
    merges: []
  - slug: deli
    label: 惣菜
    note: includes 弁当・寿司 (separate sign only in larger stores)
    merges: [惣菜]
  - slug: frozen
    label: 冷凍食品
    merges: [冷凍食品, 冷凍フルーツ]
  - slug: ice_cream
    label: アイスクリーム
    note: signed separately from 冷凍食品 in nearly all stores (signage fix 2026-06-12)
    merges: [アイスクリーム]
  - slug: sweets
    label: 菓子
    note: incl. 和菓子 and 珍味・おつまみ (drinking snacks — own sign only near 酒類 in larger stores)
    merges: [菓子, スナック菓子]
  - slug: bread
    label: パン
    merges: [パン, ベーカリー]
  - slug: rice
    label: 米
    note: split from 乾物 (separate signage — pallet/endcap with its own お米 sign); incl. 雑穀, パックご飯
    merges: [米・雑穀, 米・乾物, 穀物・雑穀]
  - slug: dry_goods
    label: 乾物
    note: kombu, katsuobushi, dried shiitake, beans, fu, 海苔・ふりかけ
    merges: [乾物・豆類]
  - slug: noodles
    label: 麺類
    note: dried udon/soba/somen + dry pasta (パスタ often separately signed — kept merged)
    merges: [乾物・パスタ, パスタ・乾物]
  - slug: instant
    label: 即席麺・カップ麺
    merges: [即席麺]
  - slug: baking
    label: 製菓材料
    note: signage often 粉類・製菓材料
    merges: [製菓・製パン材料, 製菓材料, 製菓材料・ナッツ, 製菓・ホットケーキ材料]
  - slug: jam_cereal
    label: ジャム・シリアル
    note: jam/honey/cereal shelve near パン, not with 調味料 (signage fix 2026-06-12)
    merges: [シリアル, ジャム・スプレッド, ジャム・ピーナッツバター]
  - slug: canned
    label: 缶詰・レトルト
    note: stores often split 缶詰 vs レトルト・カレー — merge is common and defensible
    merges: [缶詰, 缶詰・レトルト食品, レトルト・缶詰, 缶詰・スープ, 水煮・缶詰, スープ・だしの素, スープ・即席スープ]
  - slug: condiments
    label: 調味料
    note: soy sauce, miso, vinegar, mirin, oils, spices, dressing, mayo (jams moved to jam_cereal)
    merges: [調味料, 調味料・スパイス, 調味料・香辛料, スパイス・香辛料, 調味料・だし, 中華調味料,
             食用油, 業務用油脂]
  - slug: tea_coffee
    label: お茶・コーヒー
    note: signage-added 2026-06-12 — leaf tea/ground coffee/cocoa; RTD drinks stay in 飲料
    merges: []
  - slug: beverages
    label: 飲料
    merges: [飲料, 嗜好飲料]
  - slug: alcohol
    label: 酒類
    merges: [酒類, 洋酒]
  - slug: baby
    label: ベビーフード
    note: food-floor signage (ベビー用品 implies diapers/goods)
    merges: [ベビー用品, ベビーフード]
  - slug: international
    label: 輸入食品
    note: store-dependent (KALDI/large-format feature) — kept as a fallback bucket
    merges: [輸入食品, 中華食材]

# Store-trip labels for the three `store` enum values (primary/specialty/
# online), shipped in labels.js next to the section labels so a consumer can
# render a whole errand in Japanese. User-reviewed 2026-06-13 — lives in the
# frozen vocabulary, same review surface as the section signage above.
stores:
  primary: スーパー
  specialty: 専門店
  online: 通販

# Non-retail (decided 2026-06-12): these foods ship `errand: null` — see
# en-US.yaml for the rationale. Audit-only; checked BEFORE section patterns.
non_retail:
  merges: [ファストフード店, ファストフード, 宅配ピザ, ピザ宅配・テイクアウト, レストラン, マクドナルド,
           民族食材・先住民食品, 先住民伝統食材]
  patterns:
    - '先住民|民族|伝統食材'
    - 'サプリ|業務用'

# Audit-only fallback rules for the free-text discovery tail (first match
# wins, checked top to bottom AFTER exact merges and non_retail). These never
# ship — the production schema uses the preferred slugs above.
patterns:
  - { match: '珍味|おつまみ|洋菓子', slug: sweets }
  - { match: '輸入', slug: international }
  - { match: '^精肉|ジビエ', slug: meat }
  - { match: 'だし|スープ', slug: condiments }
  - { match: 'ナッツ|シード', slug: baking }
  - { match: 'パスタ|乾麺', slug: noodles }
  - { match: '米', slug: rice }
  - { match: '乾物|豆', slug: dry_goods }
  - { match: 'ジャム|はちみつ', slug: jam_cereal }
  - { match: 'ドレッシング|ソース|調味', slug: condiments }
  - { match: '卵', slug: dairy_eggs }
  - { match: '酒', slug: alcohol }
  - { match: 'コーヒー|紅茶', slug: tea_coffee }
  - { match: '野菜|青果|果物', slug: produce }
