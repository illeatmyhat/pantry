# Audit-only fallback rules for the free-text discovery tail (first match
# wins, checked top to bottom AFTER exact merges). These never ship — the
# production schema uses the frozen slugs above.
patterns:
  - { match: 'native|foraged|subsistence|traditional', slug: international }
  - { match: 'industrial|bulk ingredient|supplement', slug: international } # non-retail — see review doc
  - { match: 'frozen', slug: frozen }
  - { match: 'refrigerated dough', slug: dairy }
  - { match: 'refrigerated (pasta|asian)', slug: deli }
  - { match: 'vegan|vegetarian|tofu|plant-based food', slug: produce }
  - { match: 'soup|broth|canned', slug: canned }
  - { match: 'snack|chip|cracker|granola|pretzel|nutrition.*bar|breakfast bar|nuts', slug: snacks }
  - { match: 'candy|chocolate', slug: candy }
  - { match: 'baking|flour|syrup|sugar|cocoa|dessert|gelatin|pastry', slug: baking }
  - { match: 'butcher|game|meat|smoked fish|seafood|fish', slug: meat_seafood }
  - { match: 'lunch meat|hot dog|bacon|sausage|gourmet', slug: deli }
  - { match: 'dairy|yogurt|egg|cheese', slug: dairy }
  - { match: 'juice|drink|coffee|tea|beverage|lemonade|milk', slug: beverages }
  - { match: 'wine|spirit|beer|alcohol', slug: alcohol }
  - { match: 'baby', slug: baby }
  - { match: 'asian|mexican|latin|indian|international|specialty food', slug: international }
  - { match: 'condiment|dressing|sauce|gravy|pickle|olive|jam|jell|vinegar|horseradish|peanut butter', slug: condiments }
  - { match: 'pasta|grain|rice|bean|legume', slug: pasta_rice }
  - { match: 'spice|seasoning', slug: spices }
  - { match: 'bread|bakery', slug: bakery }
  - { match: 'cereal', slug: cereal }
  - { match: 'deli|prepared', slug: deli }
  - { match: 'produce|fruit|vegetable', slug: produce }
