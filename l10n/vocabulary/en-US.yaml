# en-US errand-section vocabulary — FROZEN 2026-06-12 (user-reviewed; changes within a major are additive only).
status: frozen
sections:
  - slug: produce
    label: Produce
    merges: [Produce]
  - slug: meat_seafood
    label: Meat & Seafood
    merges: [Meat, Seafood, Meat & Poultry, Meat & Seafood, Butcher Counter]
  - slug: deli
    label: Deli
    merges: [Deli, Deli & Lunch Meats, Deli / Prepared Foods]
  - slug: dairy
    label: Dairy
    note: eggs live here — US stores shelve and sign them with dairy
    merges: [Dairy]
  - slug: frozen
    label: Frozen Foods
    merges: [Frozen Foods]
  - slug: bakery
    label: Bakery
    note: the in-store baked department; packaged bread is its own aisle (signage fix 2026-06-12)
    merges: [Bakery]
  - slug: bread
    label: Bread
    note: packaged bread/buns/tortillas — PB&J shelves on this aisle, not with condiments
    merges: [Bread, Peanut Butter & Jelly]
  - slug: cereal
    label: Cereal & Breakfast
    merges: [Cereal, Cereal & Breakfast]
  - slug: baking
    label: Baking
    note: cooking oils sign as "Oil & Shortening" on this aisle (signage fix 2026-06-12); spices share its sign
    merges: [Baking, Baking Aisle, Cooking Oils]
  - slug: snacks
    label: Snacks
    merges: [Snacks, Cookies & Crackers]
  - slug: candy
    label: Candy
    merges: [Candy]
  - slug: canned
    label: Canned Goods
    note: canonical bucket (real signage is itemized) — incl. soup, broth, canned tuna/meat
    merges: [Canned Fruit, Canned Soups, Canned Goods, Canned Vegetables]
  - slug: condiments
    label: Condiments & Sauces
    merges: [Condiments & Sauces]
  - slug: spices
    label: Spices & Seasonings
    merges: [Spices & Seasonings]
  - slug: pasta_rice
    label: Pasta & Rice
    merges: [Pasta & Sauces, Rice & Grains]
  - slug: coffee_tea
    label: Coffee & Tea
    note: split from Beverages (signage fix 2026-06-12) — essentially never co-signed with soda
    merges: [Coffee & Tea]
  - slug: beverages
    label: Beverages
    note: soda/water/juice; refrigerated juice lives in Dairy/Produce
    merges: [Beverages, Juice]
  - slug: alcohol
    label: Beer & Wine
    merges: [Beer & Wine, Alcohol]
  - slug: baby
    label: Baby
    merges: [Baby, Baby Food]
  - slug: international
    label: International Foods
    merges: [International Foods]
# Non-retail (decided 2026-06-12): these foods ship `errand: null` — no store
# section honestly fits restaurant menu items, industrial ingredients, or
# subsistence foods, and there is no parking slug. Merges/patterns below are
# audit-only routing for the discovery tail; non_retail patterns are checked
# BEFORE the section patterns.
non_retail:
  merges: [Fast Food / Restaurant, Fast Food Restaurant, Restaurant, "McDonald's", Pizza Delivery,
           Pizza Restaurant Menu, Restaurant / Prepared Foods]
  patterns:
    - 'restaurant|fast food'
    - 'native|foraged|subsistence|traditional'
    - 'industrial|bulk ingredient|supplement'

# Audit-only fallback rules for the free-text discovery tail (first match
# wins, checked top to bottom AFTER exact merges and non_retail). These never
# ship — the production schema uses the frozen slugs above.
patterns:
  - { match: 'frozen', slug: frozen }
  - { match: 'refrigerated dough', slug: dairy }
  - { match: 'refrigerated (pasta|asian)', slug: deli }
  - { match: 'vegan|vegetarian|tofu|plant-based food', slug: produce }
  - { match: 'soup|broth|canned', slug: canned }
  - { match: 'snack|chip|cracker|granola|pretzel|nutrition.*bar|breakfast bar|nuts', slug: snacks }
  - { match: 'candy|chocolate', slug: candy }
  - { match: 'baking|flour|syrup|sugar|cocoa|dessert|gelatin|pastry', slug: baking }
  - { match: 'butcher|game|meat|smoked fish|seafood|fish', slug: meat_seafood }
  - { match: 'lunch meat|hot dog|bacon|sausage|gourmet', slug: deli }
  - { match: 'dairy|yogurt|egg|cheese', slug: dairy }
  - { match: 'coffee|tea', slug: coffee_tea }
  - { match: 'juice|drink|beverage|lemonade|milk', slug: beverages }
  - { match: 'wine|spirit|beer|alcohol', slug: alcohol }
  - { match: 'baby', slug: baby }
  - { match: 'asian|mexican|latin|indian|international|specialty food', slug: international }
  - { match: 'peanut butter|jam|jell', slug: bread }
  - { match: 'condiment|dressing|sauce|gravy|pickle|olive|vinegar|horseradish', slug: condiments }
  - { match: 'pasta|grain|rice|bean|legume', slug: pasta_rice }
  - { match: 'spice|seasoning', slug: spices }
  - { match: 'bread', slug: bread }
  - { match: 'bakery', slug: bakery }
  - { match: 'cereal', slug: cereal }
  - { match: 'deli|prepared', slug: deli }
  - { match: 'produce|fruit|vegetable', slug: produce }
